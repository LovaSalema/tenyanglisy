<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulaire soumis</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <!-- Favicon -->
<link rel="icon" type="image/png" href="logo-ta.png">
<link rel="apple-touch-icon" href="logo-ta.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --border: #e4e4e7;
      --text-primary: #1A5FA8;
      --text-secondary: #71717a;
      --accent: #0D2B4E;
      --accent-light: #f0ecff;
      --accent-hover: #18181b;
      --success: #16a34a;
      --success-light: #f0fdf4;
      --success-border: #bbf7d0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.06);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f4f5;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      max-width: 520px;
      width: 100%;
      padding: 48px 44px 44px;
      margin-top: 68px;
      text-align: center;
      animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 36px;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    /* Navbar */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: 68px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #e4e4e7;
      box-shadow: 0 1px 20px rgba(0,0,0,0.06);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 40px; border-radius: 8px; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-link { font-size: .85rem; color: var(--text-secondary); font-weight: 500; text-decoration: none; transition: color .2s; }
    .nav-link:hover { color: var(--text-primary); }
    .nav-cta { background: var(--text-primary); color: white; font-weight: 600; font-size: .82rem; padding: 8px 18px; border-radius: 8px; text-decoration: none; transition: all .2s; }
    .nav-cta:hover { background: #0a1f38; }
    .nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; }
    .nav-toggle span { width: 22px; height: 2px; background: var(--text-primary); border-radius: 2px; }
    .nav-menu { display: flex; align-items: center; gap: 20px; }

    /* Mobile menu */
    @media (max-width: 700px) {
      nav { padding: 0 16px; }
      .nav-right .nav-link { display: none; }
      .nav-toggle { display: flex; }
      .nav-menu { 
        display: none; position: fixed; top: 68px; left: 0; right: 0; 
        background: white; flex-direction: column; padding: 20px; gap: 0; 
        box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
      }
      .nav-menu.active { display: flex; }
      .nav-menu .nav-link { padding: 12px 0; border-bottom: 1px solid #e4e4e7; width: 100%; text-align: left; }
      .card { margin-top: 88px; padding: 32px 24px; }
    }

    /* Success icon */
    .icon-wrap {
      width: 64px;
      height: 64px;
      background: var(--success-light);
      border: 1.5px solid var(--success-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: popIn 0.45s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    .icon-wrap svg {
      width: 28px;
      height: 28px;
      stroke: var(--success);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.4px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* Email notice badge */
    .email-notice {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-light);
      border: 1px solid #ddd6fe;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 32px;
      text-align: left;
    }

    .email-notice svg {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .email-notice p {
      font-size: 13.5px;
      color: #4c1d95;
      line-height: 1.5;
    }

    .email-notice strong {
      font-weight: 600;
    }

    /* Button */
    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 13px 20px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 14.5px;
      font-weight: 500;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      letter-spacing: -0.1px;
    }

    .btn-home:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 16px rgba(108, 71, 255, 0.28);
      transform: translateY(-1px);
    }

    .btn-home:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-home svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Footer */
    .footer {
      margin-top: 32px;
       padding-bottom: 32px;
      font-size: 12.5px;
      color: #a1a1aa;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .footer a {
      color: #a1a1aa;
      text-decoration: none;
    }

    .footer a:hover { color: var(--accent); }

    .dot { opacity: 0.5; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav role="navigation" aria-label="Navigation principale">
  <a href="index.html" class="nav-logo" aria-label="Accueil Teny Anglisy">
    <img src="logo-ta.png" alt="Teny Anglisy Logo">
  </a>
  <div class="nav-right">
    <div class="nav-toggle" onclick="document.querySelector('.nav-menu').classList.toggle('active')" aria-label="Menu">
      <span></span><span></span><span></span>
    </div>
    <div class="nav-menu">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="test-guide.html" class="nav-link">Tests</a>
      <a href="prompt.html" class="nav-link">Prompts</a>
      <a href="https://tally.so/r/pbL8WP" class="nav-cta" target="_blank" rel="noopener">Guide PDF →</a>
    </div>
  </div>
</nav>

<div class="card">

    <!-- Logo -->
    <a href="/" class="logo">
      
    <img src="logo-ta.png" alt="Teny Anglisy" style="width:80px;height: auto;border-radius:9px; margin: 25px">
  
    </a>

    <!-- Success icon -->
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>

    <h1>Réponse enregistrée !</h1>
    <!-- <p class="subtitle">
      Merci pour votre soumission. Vos informations ont bien été reçues et sont en cours de traitement.
    </p> -->

    <!-- Email notice -->
    <div class="email-notice">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="4" width="20" height="16" rx="2"/>

      </svg>
      <p>
        Un <strong>email de confirmation</strong> vous a été envoyé. Pensez à vérifier vos spams si vous ne le trouvez pas dans votre boîte principale.
      </p>
    </div>

    <!-- Back home button -->
    <a href="index.html" class="btn-home">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back Home
    </a>

  </div>

  <!-- Footer -->
  <p class="footer">
    Propulsé par <a href="#">TenyAnglisy</a>
    <span class="dot">·</span>
    <a href="#">Confidentialité</a>
  </p>

</body>
</html>
